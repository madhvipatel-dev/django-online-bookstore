<!DOCTYPE html>
<html>
<head>
    <title>Order Success</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #a8edea, #fed6e3);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .container {
            background: white;
            padding: 40px;
            width: 400px;
            text-align: center;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            color: #27ae60;
            margin-bottom: 15px;
        }

        p {
            color: #555;
            font-size: 16px;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 16px;
        }

        .btn:hover {
            background: #2980b9;
        }

        .icon {
            font-size: 50px;
            color: #27ae60;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="icon">✅</div>

    <h1>Order Placed Successfully!</h1>

    <p>Your order has been placed successfully.</p>

    <a href="/" class="btn">🏠 Go to Home</a>

</div>

</body>
</html>
